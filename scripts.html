    <h1>Killmenu</h1>
    <p>The following one-liner uses <a href='https://tools.suckless.org/dmenu/'>dmenu</a> to choose one of the currently running processes.
       The chosen process will be kill -9ed.</p>
    <pre>kill -9 $(ps ax | dmenu -l 30 | cut -d' ' -f2)</pre>
